<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Fenalco — Notificaciones</title>
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            fenalco: {
              purple: '#280071', 'purple-dark': '#1e0057', 'purple-light': '#3a0099',
              green: '#00CE7C', 'green-hover': '#00b369',
              blue: '#009CDE', gray: '#484954',
            }
          }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body class="bg-[#f5f5f5] min-h-screen" x-data="notifApp()" x-init="init()">

  <!-- ── SIDEBAR ──────────────────────────────────────────── -->
  <div x-show="sidebarOpen" @click="sidebarOpen = false"
    class="fixed inset-0 bg-black/40 z-20 lg:hidden"
    x-transition:enter="transition-opacity duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
  </div>

  <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
    class="fixed top-0 left-0 h-full w-64 bg-fenalco-purple z-30 flex flex-col transition-transform duration-300 ease-in-out">
    <div class="flex items-center justify-center px-6 py-6 border-b border-white/10">
      <img src="/img/logo.svg" alt="Fenalco" class="h-10"
        onerror="this.outerHTML='<span class=\'text-white font-bold text-xl tracking-wide\'>Fenalco</span>'" />
    </div>
    <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto">
      <template x-for="item in navItems" :key="item.href">
        <a :href="item.href"
          :class="item.active ? 'bg-white/15 text-white' : 'text-white/60 hover:bg-white/10 hover:text-white'"
          class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">
          <span x-html="item.icon" class="w-5 h-5 flex-shrink-0"></span>
          <span x-text="item.label"></span>
          <span x-show="item.active" class="ml-auto w-1.5 h-1.5 rounded-full bg-fenalco-green"></span>
        </a>
      </template>
    </nav>
    <div class="px-4 py-4 border-t border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-fenalco-green flex items-center justify-center flex-shrink-0">
          <span class="text-white text-xs font-bold" x-text="iniciales"></span>
        </div>
        <div class="min-w-0">
          <p class="text-white text-xs font-medium truncate" x-text="nombre"></p>
          <p class="text-white/50 text-xs capitalize" x-text="role"></p>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── LAYOUT PRINCIPAL ──────────────────────────────────── -->
  <div class="lg:ml-64 flex flex-col min-h-screen">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 px-4 lg:px-8 py-3 flex items-center justify-between sticky top-0 z-10">
      <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden p-2 rounded-lg text-fenalco-gray hover:bg-gray-100 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="hidden lg:flex items-center gap-2">
        <span class="text-fenalco-gray text-sm">CRM</span>
        <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <span class="text-fenalco-purple text-sm font-medium">Notificaciones</span>
      </div>
      <div class="flex items-center gap-3 ml-auto">
        <div class="hidden sm:flex flex-col items-end">
          <span class="text-sm font-medium text-gray-800" x-text="nombre"></span>
          <span class="text-xs text-fenalco-gray capitalize" x-text="role"></span>
        </div>
        <div class="w-8 h-8 rounded-full bg-fenalco-purple flex items-center justify-center">
          <span class="text-white text-xs font-bold" x-text="iniciales"></span>
        </div>
        <button @click="logout()" class="flex items-center gap-1.5 text-xs text-fenalco-gray hover:text-red-600 transition-colors px-2 py-1.5 rounded-lg hover:bg-red-50" title="Cerrar sesión">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          <span class="hidden sm:inline">Salir</span>
        </button>
      </div>
    </header>

    <!-- CONTENIDO -->
    <main class="flex-1 px-4 lg:px-8 py-8">

      <!-- Encabezado -->
      <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-xl font-bold text-fenalco-purple">Notificaciones</h1>
          <p class="text-fenalco-gray text-sm mt-0.5">Alertas de mora crítica y compromisos vencidos</p>
        </div>
        <div class="flex items-center gap-2">
          <!-- Filtro tipo -->
          <select x-model="filtroTipo" @change="fetchNotificaciones()"
            class="text-sm border border-gray-300 rounded-lg px-3 py-2 text-fenalco-gray bg-white focus:outline-none focus:ring-1 focus:ring-fenalco-purple">
            <option value="">Todos los tipos</option>
            <option value="mora_critica">Mora crítica</option>
            <option value="compromiso_vencido">Compromiso vencido</option>
          </select>
          <!-- Filtro leídas -->
          <select x-model="filtroLeida" @change="fetchNotificaciones()"
            class="text-sm border border-gray-300 rounded-lg px-3 py-2 text-fenalco-gray bg-white focus:outline-none focus:ring-1 focus:ring-fenalco-purple">
            <option value="">Todas</option>
            <option value="false">No leídas</option>
            <option value="true">Leídas</option>
          </select>
          <!-- Marcar todas leídas -->
          <button
            x-show="totalNoLeidas > 0"
            @click="leerTodas()"
            class="flex items-center gap-1.5 text-sm border border-fenalco-blue text-fenalco-blue px-3 py-2 rounded-lg hover:bg-blue-50 transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            Marcar todas leídas
          </button>

          <!-- Ejecutar check (solo admin) -->
          <button
            x-show="role === 'admin'"
            @click="ejecutarCheck()"
            :disabled="checkLoading"
            class="flex items-center gap-1.5 text-sm border border-gray-300 text-fenalco-gray px-3 py-2 rounded-lg hover:bg-gray-50 transition-colors disabled:opacity-50"
            title="Ejecutar verificación de mora ahora"
          >
            <svg :class="checkLoading ? 'animate-spin' : ''" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span x-text="checkLoading ? 'Ejecutando...' : 'Verificar ahora'"></span>
          </button>
        </div>
      </div>

      <!-- Info bar -->
      <div x-show="!loading && totalNoLeidas > 0" class="mb-4 flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-xl px-4 py-2.5">
        <span class="w-2 h-2 rounded-full bg-fenalco-blue animate-pulse"></span>
        <span class="text-sm text-blue-700">
          Tienes <strong x-text="totalNoLeidas"></strong> notificación<span x-show="totalNoLeidas !== 1">es</span> sin leer.
        </span>
      </div>

      <!-- Loading -->
      <div x-show="loading" class="flex items-center justify-center py-20">
        <svg class="animate-spin w-7 h-7 text-fenalco-purple" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </div>

      <!-- Lista de notificaciones -->
      <div x-show="!loading" class="space-y-2">

        <!-- Empty state -->
        <div x-show="notificaciones.length === 0" class="bg-white rounded-xl border border-gray-200 py-16 text-center">
          <div class="w-14 h-14 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
          </div>
          <p class="text-fenalco-gray text-sm font-medium">Sin notificaciones</p>
          <p class="text-gray-400 text-xs mt-1">No hay alertas que coincidan con los filtros seleccionados</p>
        </div>

        <!-- Items -->
        <template x-for="n in notificaciones" :key="n._id">
          <div
            :class="!n.leida ? 'border-l-4 border-l-fenalco-blue' : 'border-l-4 border-l-transparent'"
            class="bg-white rounded-xl border border-gray-200 p-4 flex items-start gap-4 hover:shadow-sm transition-shadow"
          >
            <!-- Ícono tipo -->
            <div :class="n.tipo === 'mora_critica' ? 'bg-red-100' : 'bg-amber-100'"
              class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 mt-0.5">
              <svg class="w-5 h-5" :class="n.tipo === 'mora_critica' ? 'text-red-600' : 'text-amber-600'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path x-show="n.tipo === 'mora_critica'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                <path x-show="n.tipo !== 'mora_critica'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
            </div>

            <!-- Contenido -->
            <div class="flex-1 min-w-0">
              <div class="flex items-start justify-between gap-2">
                <div>
                  <p class="text-sm font-semibold text-gray-800" x-text="n.titulo"></p>
                  <p class="text-xs text-gray-500 mt-0.5" x-text="n.mensaje"></p>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                  <span x-show="!n.leida" class="w-2.5 h-2.5 rounded-full bg-fenalco-blue mt-1"></span>
                  <span
                    :class="n.tipo === 'mora_critica' ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'"
                    class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
                    x-text="tipoLabel(n.tipo)"
                  ></span>
                </div>
              </div>
              <div class="flex items-center gap-4 mt-2">
                <!-- Afiliado link -->
                <a x-show="n.afiliado" :href="'/cartera.html'"
                  class="inline-flex items-center gap-1 text-xs text-fenalco-blue hover:underline">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                  </svg>
                  <span x-text="n.afiliado?.razonSocial || 'Ver cartera'"></span>
                </a>
                <!-- Fecha -->
                <span class="text-xs text-gray-400" x-text="fmtFecha(n.createdAt)"></span>
                <!-- Email enviado -->
                <span x-show="n.emailEnviado" class="inline-flex items-center gap-1 text-xs text-fenalco-green">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                  </svg>
                  Email enviado
                </span>
              </div>
            </div>

            <!-- Acciones -->
            <div class="flex items-center gap-1 flex-shrink-0">
              <button
                x-show="!n.leida"
                @click="marcarLeida(n)"
                class="p-1.5 rounded-lg text-gray-400 hover:text-fenalco-blue hover:bg-blue-50 transition-colors"
                title="Marcar como leída"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
              </button>
              <button
                @click="eliminar(n)"
                class="p-1.5 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors"
                title="Eliminar"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>
        </template>
      </div>

      <!-- Paginación -->
      <div x-show="!loading && paginas > 1" class="flex items-center justify-center gap-2 mt-6">
        <button
          @click="pagina--; fetchNotificaciones()"
          :disabled="pagina <= 1"
          class="p-2 rounded-lg border border-gray-300 text-fenalco-gray hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <span class="text-sm text-fenalco-gray">
          Página <strong x-text="pagina"></strong> de <strong x-text="paginas"></strong>
        </span>
        <button
          @click="pagina++; fetchNotificaciones()"
          :disabled="pagina >= paginas"
          class="p-2 rounded-lg border border-gray-300 text-fenalco-gray hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <!-- Toast de check ejecutado -->
      <div
        x-show="checkMsg"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed bottom-6 right-6 bg-fenalco-purple text-white text-sm px-4 py-2.5 rounded-xl shadow-lg"
        x-text="checkMsg"
        style="display:none;"
      ></div>

    </main>
  </div>

  <script>
    function notifApp() {
      return {
        token: localStorage.getItem('crm_token'),
        nombre: localStorage.getItem('crm_nombre') || 'Usuario',
        role: localStorage.getItem('crm_role') || '',
        sidebarOpen: false,

        notificaciones: [],
        loading: true,
        total: 0,
        totalNoLeidas: 0,
        paginas: 1,
        pagina: 1,
        filtroTipo: '',
        filtroLeida: '',
        checkLoading: false,
        checkMsg: '',

        get navItems() {
          const all = [
            { href: '/dashboard.html', label: 'Dashboard', active: false, icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>' },
            { href: '/afiliados.html', label: 'Afiliados', active: false, icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' },
            { href: '/cartera.html', label: 'Cartera', active: false, icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>' },
            { href: '/notificaciones.html', label: 'Notificaciones', active: true, icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>' },
            { href: '/ejecutivos.html', label: 'Ejecutivos', active: false, icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>' },
            { href: '/usuarios.html', label: 'Usuarios', active: false, adminOnly: true, icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' },
          ];
          return all.filter(i => !i.adminOnly || this.role === 'admin');
        },

        get iniciales() {
          return this.nombre.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
        },

        async init() {
          if (!this.token) { window.location.href = '/'; return; }
          await this.fetchNotificaciones();
          await this.fetchCount();
        },

        async fetchNotificaciones() {
          this.loading = true;
          try {
            const params = new URLSearchParams({ pagina: this.pagina, limite: 20 });
            if (this.filtroTipo) params.set('tipo', this.filtroTipo);
            if (this.filtroLeida !== '') params.set('soloNoLeidas', this.filtroLeida === 'false' ? 'true' : '');
            const res = await fetch(`/api/notificaciones?${params}`, {
              headers: { Authorization: `Bearer ${this.token}` }, credentials: 'include',
            });
            if (res.status === 401) { this.logout(); return; }
            if (!res.ok) throw new Error();
            const data = await res.json();
            this.notificaciones = data.notificaciones;
            this.total = data.total;
            this.paginas = data.paginas;
          } catch {}
          finally { this.loading = false; }
        },

        async fetchCount() {
          try {
            const r = await fetch('/api/notificaciones/count', { headers: { Authorization: `Bearer ${this.token}` }, credentials: 'include' });
            if (r.ok) { const d = await r.json(); this.totalNoLeidas = d.count; }
          } catch {}
        },

        async marcarLeida(n) {
          n.leida = true;
          this.totalNoLeidas = Math.max(0, this.totalNoLeidas - 1);
          await fetch(`/api/notificaciones/${n._id}/leer`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${this.token}` }, credentials: 'include',
          });
        },

        async leerTodas() {
          await fetch('/api/notificaciones/leer-todas', {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${this.token}` }, credentials: 'include',
          });
          this.notificaciones.forEach(n => n.leida = true);
          this.totalNoLeidas = 0;
        },

        async eliminar(n) {
          await fetch(`/api/notificaciones/${n._id}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${this.token}` }, credentials: 'include',
          });
          this.notificaciones = this.notificaciones.filter(x => x._id !== n._id);
          if (!n.leida) this.totalNoLeidas = Math.max(0, this.totalNoLeidas - 1);
        },

        async ejecutarCheck() {
          this.checkLoading = true;
          try {
            await fetch('/api/notificaciones/ejecutar-check', {
              method: 'POST',
              headers: { Authorization: `Bearer ${this.token}` }, credentials: 'include',
            });
            this.checkMsg = 'Verificación iniciada. Las nuevas alertas aparecerán en breve.';
            setTimeout(() => { this.checkMsg = ''; }, 4000);
            setTimeout(() => this.fetchNotificaciones(), 3000);
          } catch {}
          finally { this.checkLoading = false; }
        },

        tipoLabel(tipo) {
          return { mora_critica: 'Mora crítica', compromiso_vencido: 'Compromiso vencido', cuota_vencida: 'Cuota vencida' }[tipo] || tipo;
        },

        fmtFecha(iso) {
          return new Date(iso).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        },

        logout() {
          fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
          ['crm_token', 'crm_role', 'crm_nombre'].forEach(k => localStorage.removeItem(k));
          window.location.href = '/';
        },
      };
    }
  </script>

</body>
